# Hybrid model: scoring runs locally on the Max plan and pushes web/ here.
# No build step — web/ is already static, so deploys cost zero build minutes.
[build]
  publish = "web"
  command = ""

# Live-spot service: runs server-side on Netlify so the dashboard's spot keeps
# updating even when the local scoring box is off (see netlify/functions/spot.mjs).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cloud watchdog: every 15 min it reads dashboard.json and pushes an ntfy alert if the board
# has gone stale during market hours (catches PC-off / loop-crash / publish-stuck). The function
# self-gates to the 09:50–16:00 ET window, so off-hours runs are cheap no-ops. See watchdog.mjs.
[functions."watchdog"]
  schedule = "*/15 * * * *"

# The board JSON must never be cached by the CDN, or the phone shows a stale board.
[[headers]]
  for = "/dashboard.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

# Same for the pre-open narrative — must reflect today's generated file, never a cached one.
[[headers]]
  for = "/narrative.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

# The shell + assets must revalidate every load, or a redeploy shows the OLD UI
# (browser keeps the cached styles.css/app.js). no-cache = use cache only after a
# 304, so deploys appear immediately without bumping ?v= by hand.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "no-cache"
[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache"

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080a0f" />
  <title>Mesa · QQQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="brand">
        <span class="ticker">QQQ</span>
        <div class="brandtext">
          <span class="title">Mesa</span>
          <span class="eyebrow">dealer positioning · QQQ / MNQ</span>
        </div>
      </div>
      <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">loading</span>
      </div>
    </header>

    <section class="hero">
      <div class="spotblock">
        <span class="lbl">Spot</span>
        <div class="spotrow">
          <span class="spotnum" id="heroSpot">—</span>
          <span class="spotchg" id="heroChg"></span>
        </div>
        <span class="spotsrc muted" id="heroSrc"></span>
      </div>
      <div class="metrics" id="heroMetrics"></div>
    </section>

    <p class="read" id="heroRead" hidden></p>

    <div class="banner" id="banner" hidden></div>

    <section class="ladder" id="ladder" aria-label="Price levels">
      <div class="rungs" id="ceilings"></div>
      <div class="spotrail" id="spotrail" hidden>
        <span class="rail-line"></span>
        <span class="rail-tag" id="railTag"></span>
        <span class="rail-line"></span>
      </div>
      <div class="rungs" id="floors"></div>
    </section>

    <div class="empty" id="empty" hidden></div>

    <footer class="foot">
      <ul class="legend">
        <li><span class="swatch sup"></span>floor / support</li>
        <li><span class="swatch res"></span>ceiling / resistance</li>
        <li><span class="swatch spot"></span>spot</li>
      </ul>
      <div class="foot-right">
        <span id="asOf" class="muted"></span>
        <button id="refresh" type="button" aria-label="Refresh">↻</button>
      </div>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>

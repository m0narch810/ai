<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <title>Mesa · QQQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main id="app">

  <header class="topbar">
    <div class="brand">
      <span class="ticker">QQQ</span>
      <div class="brandtext">
        <span class="title">Mesa</span>
        <span class="eyebrow">dealer positioning · QQQ / MNQ</span>
      </div>
    </div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">loading</span>
    </div>
  </header>

  <!-- ── HERO ── -->
  <div class="hero">
    <div class="hero-spot">
      <span class="lbl">Spot</span>
      <span class="spotnum" id="heroSpot">—</span>
      <span class="spotchg" id="heroChg"></span>
      <span class="spotsrc" id="heroSrc"></span>
    </div>
    <div class="hero-spark">
      <span class="lbl">Session</span>
      <canvas id="sparkline" class="sparkline" width="200" height="48"></canvas>
      <span class="spark-range" id="sparkRange"></span>
    </div>
    <div class="hero-metrics" id="heroMetrics"></div>
    <div class="hero-iv" id="heroIv"></div>
  </div>

  <!-- ── READ LINE ── -->
  <div class="read-wrap" id="readWrap" hidden>
    <span class="read-label">READ</span>
    <p id="heroRead"></p>
  </div>

  <div class="banner" id="banner" hidden></div>

  <!-- ── CHARTS (desktop only) ── -->
  <div class="charts-section" id="chartsSection">
    <div class="chart-panel">
      <div class="chart-hdr">
        <span class="chart-title">GEX Profile</span>
        <span class="chart-sub" id="gexChartSub">+red=resistance · −green=support</span>
      </div>
      <svg id="gexChart" class="chart-svg" viewBox="0 0 400 160" preserveAspectRatio="none"></svg>
    </div>
    <div class="chart-panel">
      <div class="chart-hdr">
        <span class="chart-title">Price · VWAP</span>
        <span class="chart-sub" id="candleChartSub">5-min candles</span>
      </div>
      <svg id="candleChart" class="chart-svg" viewBox="0 0 400 160" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- ── MOBILE LEVEL MAP ── -->
  <div class="level-map-wrap" id="levelMapWrap" hidden>
    <div class="level-map-hdr">
      <span class="level-map-title">Level Map</span>
      <span class="spark-range" id="levelMapLabel"></span>
    </div>
    <svg id="levelMap" class="level-map"></svg>
  </div>

  <!-- ── LADDER ── -->
  <div class="ladder-grid" id="ladderGrid" aria-label="Price levels">
    <div class="ladder-col" id="colCeil">
      <div class="section-hdr">
        <span class="section-icon res"></span>
        <span class="section-title">Ceilings</span>
        <span class="section-count" id="ceilCount"></span>
      </div>
      <div class="rungs" id="ceilings"></div>
    </div>
    <div class="ladder-col" id="colFloor">
      <div class="section-hdr">
        <span class="section-icon sup"></span>
        <span class="section-title">Floors</span>
        <span class="section-count" id="floorCount"></span>
      </div>
      <div class="rungs" id="floors"></div>
      <div class="spotrail" id="spotrail" hidden>
        <span class="rail-line"></span>
        <span class="rail-tag" id="railTag"></span>
        <span class="rail-line"></span>
      </div>
    </div>
  </div>

  <div class="empty" id="empty" hidden></div>

  <footer class="foot">
    <ul class="legend">
      <li><span class="swatch sup"></span>floor</li>
      <li><span class="swatch res"></span>ceiling</li>
      <li><span class="swatch spot"></span>spot</li>
    </ul>
    <div class="foot-right">
      <span id="asOf"></span>
      <button id="refresh" type="button" aria-label="Refresh">↻</button>
    </div>
  </footer>

</main>
<script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>QQQ · Reversal Elevation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="masthead">
      <div class="brand">
        <span class="eyebrow">Altaris · options structure</span>
        <h1>QQQ Reversal Elevation</h1>
      </div>
      <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">loading</span>
      </div>
    </header>

    <div class="readout" id="readout"></div>

    <section class="gauge" id="gauge" aria-label="Reversal levels by price">
      <div class="axis" id="axis"></div>
      <div class="walls" id="walls"></div>
      <div class="datum" id="datum" hidden>
        <span class="datum-tag" id="datumTag"></span>
        <span class="datum-line"></span>
      </div>
    </section>

    <footer class="foot">
      <ul class="legend">
        <li><span class="swatch sup"></span>support floor</li>
        <li><span class="swatch res"></span>resistance ceiling</li>
        <li><span class="swatch spot"></span>spot</li>
      </ul>
      <div class="foot-right">
        <span id="asOf" class="muted"></span>
        <button id="refresh" type="button" aria-label="Refresh board">↻</button>
      </div>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f4f2" />
  <title>TORII · QQQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>

<canvas id="bg" class="bg-canvas" aria-hidden="true"></canvas>

<main id="app">

  <!-- ── HEADER ── -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">鳥居</span>
      <span class="brand-en">TORII</span>
    </div>
    <div class="status">
      <span class="clock" id="clock"></span>
      <span class="status-sep"></span>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">BOOT</span>
    </div>
  </header>

  <!-- ── SPEC BAR ── -->
  <div class="specbar" id="specbar">QQQ / MNQ — DEALER POSITIONING — LIMIT ORDERS AT LEVELS</div>

  <!-- ── TOP GRID ── -->
  <div class="topgrid">

    <section class="sec spot-sec">
      <div class="sec-label"><span><i class="ix">01</i> SPOT</span><span class="jp">現値</span></div>
      <div class="sec-body">
        <div class="spot-line">
          <span class="spotnum" id="heroSpot">—</span>
          <span class="spotchg" id="heroChg"></span>
        </div>
        <span class="spotsrc" id="heroSrc"></span>
        <div class="spark-panel">
          <canvas id="sparkline" class="sparkline"></canvas>
          <span class="spark-range" id="sparkRange"></span>
        </div>
      </div>
    </section>

    <section class="sec metrics-sec">
      <div class="sec-label"><span><i class="ix">02</i> FLOW</span><span class="jp">需給</span></div>
      <div class="sec-body metrics" id="metricsRow"></div>
    </section>

  </div>

  <!-- ── READ ── -->
  <section class="sec read-sec" id="readWrap" hidden>
    <div class="sec-label"><span><i class="ix">03</i> READ</span><span class="jp">読み</span></div>
    <div class="sec-body"><p id="heroRead"></p></div>
  </section>

  <!-- ── BANNER ── -->
  <div class="banner" id="banner" hidden></div>

  <!-- ── CHARTS (desktop) ── -->
  <div class="charts-section" id="chartsSection">
    <section class="sec chart-panel">
      <div class="sec-label"><span><i class="ix">G</i> GEX PROFILE</span><span class="jp" id="gexChartSub">抵抗 / 支持</span></div>
      <svg id="gexChart" class="chart-svg" viewBox="0 0 400 150" preserveAspectRatio="none"></svg>
    </section>
    <section class="sec chart-panel">
      <div class="sec-label"><span><i class="ix">P</i> PRICE · VWAP</span><span class="jp" id="candleChartSub">5-MIN</span></div>
      <svg id="candleChart" class="chart-svg" viewBox="0 0 400 150" preserveAspectRatio="none"></svg>
    </section>
  </div>

  <!-- ── MOBILE LEVEL MAP ── -->
  <section class="sec level-map-wrap" id="levelMapWrap" hidden>
    <div class="sec-label"><span><i class="ix">M</i> MAP</span><span class="jp" id="levelMapLabel"></span></div>
    <div class="sec-body"><svg id="levelMap" class="level-map"></svg></div>
  </section>

  <!-- ── LADDER ── -->
  <div class="ladder" id="ladderGrid" aria-label="Price levels">

    <section class="sec lane res-lane">
      <div class="sec-label">
        <span><i class="ix tick-res">04</i> RESISTANCE</span>
        <span class="jp">抵抗 <i class="lane-count" id="ceilCount"></i></span>
      </div>
      <div class="rungs" id="ceilings"></div>
    </section>

    <div class="spotrail" id="spotrail" hidden>
      <span class="rail-line"></span>
      <span class="rail-tag" id="railTag"></span>
      <span class="rail-line"></span>
    </div>

    <section class="sec lane sup-lane">
      <div class="sec-label">
        <span><i class="ix tick-sup">05</i> SUPPORT</span>
        <span class="jp">支持 <i class="lane-count" id="floorCount"></i></span>
      </div>
      <div class="rungs" id="floors"></div>
    </section>

  </div>

  <div class="empty" id="empty" hidden></div>

  <footer class="foot">
    <span id="asOf"></span>
    <button id="refresh" type="button" aria-label="Refresh">SYNC ↻</button>
  </footer>

</main>

<script src="app.js?v=10"></script>
</body>
</html>
